<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - ProShop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fc; padding: 40px; }
        .invoice-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 28px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .invoice-header { text-align: center; margin-bottom: 30px; }
        .invoice-header h1 { font-size: 2rem; color: #1a1a2e; }
        .invoice-details { margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f1f5f9; }
        .total-row { font-weight: 800; font-size: 1.2rem; }
        .actions { display: flex; gap: 16px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        button { background: #1a1a2e; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        button:hover { background: #e94560; }
        @media print { body { background: white; padding: 0; } .actions { display: none; } .invoice-container { box-shadow: none; padding: 20px; } }
    </style>
</head>
<body>
<div class="invoice-container" id="invoiceContainer"><div id="invoiceContent"></div><div class="actions"><button onclick="window.print()">🖨️ Print Invoice</button><button onclick="downloadInvoice()">📥 Download Invoice</button><button onclick="window.location.href='index.html'">← Back to Shop</button></div></div>
<script>
    function loadInvoice() {
        let order = JSON.parse(localStorage.getItem("last_order"));
        let settings = JSON.parse(localStorage.getItem("proshop_settings") || '{"siteName":"ProShop"}');
        if (!order) { document.getElementById("invoiceContent").innerHTML = '<p style="text-align:center;">No order found. <a href="index.html">Go to Shop</a></p>'; return; }
        let itemsHtml = order.items.map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>$${i.price}</td><td>$${i.price * i.quantity}</td></tr>`).join('');
        document.getElementById("invoiceContent").innerHTML = `<div class="invoice-header"><h1>${settings.siteName}</h1><p>Thank you!</p></div><div class="invoice-details"><p><strong>Invoice:</strong> ${order.invoiceNo}</p><p><strong>Date:</strong> ${order.date}</p><p><strong>Name:</strong> ${order.customerName}</p><p><strong>Phone:</strong> ${order.phone}</p><p><strong>Address:</strong> ${order.address}</p></div><table><thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>${itemsHtml}</tbody><tfoot><tr class="total-row"><td colspan="3"><strong>Grand Total</strong></td><td><strong>$${order.total}</strong></td></tr></tfoot></table><p style="text-align:center;margin-top:30px;">Thank you for shopping with us!</p>`;
    }
    function downloadInvoice() {
        let content = document.getElementById("invoiceContent").innerHTML;
        let settings = JSON.parse(localStorage.getItem("proshop_settings") || '{"siteName":"ProShop"}');
        let blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invoice - ${settings.siteName}</title><style>body{font-family:Arial;padding:40px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ccc;padding:10px;text-align:left;}</style></head><body>${content}</body></html>`], { type: "text/html" });
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "invoice.html"; a.click(); URL.revokeObjectURL(a.href);
    }
    loadInvoice();
</script>
</body>
</html>
